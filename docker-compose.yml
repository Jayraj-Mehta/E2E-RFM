version: '3.8'

services:
  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rfm-backend-api
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: always

  frontend-ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rfm-frontend-ui
    ports:
      - "8501:8501"
    depends_on:
      - backend-api
    restart: always